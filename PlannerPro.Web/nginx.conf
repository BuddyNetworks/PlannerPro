events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Hashed build assets are immutable — cache them hard.
        location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA routes: hand every unknown path to Angular's client-side router.
        # NOTE: /api is NOT proxied here — the AKS ingress routes /api straight
        # to the plannerproapi service, keeping the browser on one origin.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
