apiVersion: apps/v1
kind: Deployment
metadata:
  name: plannerproweb
  namespace: brr-dev-ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plannerproweb
  template:
    metadata:
      labels:
        app: plannerproweb
    spec:
      imagePullSecrets:
        - name: buddynetworks37436e08-auth
      containers:
        - name: plannerproweb
          image: buddynetworks.azurecr.io/plannerproweb
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
