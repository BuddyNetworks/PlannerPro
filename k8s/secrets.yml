  # Azure SQL; TrustServerCertificate only for self-signed in-cluster servers.
  ConnectionStrings__plannerdb: "Server=tcp:bnspike.database.windows.net,1433;Initial Catalog=planner;Persist Security Info=False;User ID=robert;Password=Chicago1103$$$;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
  # First-run seed login (DbSeeder). Safe to leave after the user exists.
  SeedUser__Email: "admin@buddynetworks.net"
  SeedUser__Password: "ChangeMe1974!!!"

# Imperative alternative (keeps secrets out of any file):
#   kubectl create secret generic plannerpro-secrets -n brr-dev-ingress \
#     --from-literal=ConnectionStrings__plannerdb="Server=tcp:...;Database=plannerdb;User ID=...;Password=...;Encrypt=True;" \
#     --from-literal=SeedUser__Email="admin@buddynetworks.net" \
